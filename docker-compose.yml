services:
  postgres:
    image: postgres:16-alpine
    container_name: odovox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: odovox
      POSTGRES_PASSWORD: odovox
      POSTGRES_DB: odovox
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - odovox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odovox -d odovox"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odovox-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - odovox_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: odovox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: odovox
      MINIO_ROOT_PASSWORD: odovox-dev-password
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - odovox_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  odovox_pg_data:
  odovox_redis_data:
  odovox_minio_data:
