services:
  postgres:
    image: postgres:16-alpine
    container_name: odovox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: odovox
      POSTGRES_PASSWORD: odovox
      POSTGRES_DB: odovox
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - odovox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odovox -d odovox"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odovox-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - odovox_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  odovox_pg_data:
  odovox_redis_data:
